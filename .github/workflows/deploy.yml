name: Deploy Lambdas to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Detect Changes and Deploy
        shell: bash
        run: |
          SHARED_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^shared/' || true)
          ALL_LAMBDAS="firmos-sms-webhook firmos-sms-router firmos-intake-agent firmos-status-bot firmos-escalation firmos-twilio-send firmos-crud firmos-whoami firmos-audit-digest firmos-clio-sync firmos-crm-push firmos-onboard-firm"
          LAMBDAS_TO_DEPLOY=""

          if [ -n "$SHARED_CHANGED" ]; then
            echo "Shared files changed - deploying ALL lambdas"
            LAMBDAS_TO_DEPLOY="$ALL_LAMBDAS"
          else
            CHANGED_DIRS=$(git diff --name-only HEAD~1 HEAD | grep -E '^lambdas/firmos-' | cut -d/ -f2 | sort -u || true)
            LAMBDAS_TO_DEPLOY="$CHANGED_DIRS"
          fi

          if [ -z "$LAMBDAS_TO_DEPLOY" ]; then
            echo "No Lambda changes detected — skipping deploy"
            exit 0
          fi

          for LAMBDA_NAME in $LAMBDAS_TO_DEPLOY; do
            LAMBDA_DIR="lambdas/$LAMBDA_NAME"
            TEMP_DIR="/tmp/$LAMBDA_NAME"

            if [ ! -d "$LAMBDA_DIR" ]; then
              echo "Lambda directory not found: $LAMBDA_DIR"
              continue
            fi

            mkdir -p "$TEMP_DIR"
            cp "$LAMBDA_DIR/lambda_function.py" "$TEMP_DIR/"
            cp shared/shared_db.py "$TEMP_DIR/"
            cp shared/shared_ai.py "$TEMP_DIR/"
            cp shared/shared_twilio.py "$TEMP_DIR/"
            cp shared/shared_auth.py "$TEMP_DIR/"

            cd "$TEMP_DIR"
            zip -r "/tmp/$LAMBDA_NAME.zip" . -x "__pycache__/*" "*.pyc"
            cd - > /dev/null

            aws lambda update-function-code --function-name "$LAMBDA_NAME" --zip-file "fileb:///tmp/$LAMBDA_NAME.zip" --region us-east-2 --output text --query 'LastUpdateStatus'
            aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region us-east-2
            echo "Deployed: $LAMBDA_NAME"
          done
